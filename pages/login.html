<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN">
<html>
<head>
    <title>Kismaayo Hotel - Login</title>
    <link rel="stylesheet" href="../css/style.css">

</head>
<body>

<script>
if (localStorage.getItem("hotelUser")) {
    window.location.href = "../index.html";
}
</script>

<table class="log-layout">
<tr><td class="log-header">Kismaayo Hotel</td></tr>
<tr><td class="log-body">

<div class="log-box">
<h2 style="border-bottom:2px solid #08c; padding-bottom:8px; margin-top:0;">Login</h2>
<p style="color:#555;">Ku soo gal account-kaaga si aad u booking gashato.</p>

<form id="loginForm">
<table style="width:100%;">
<tr><td style="padding:5px; font-weight:bold;">Email / Username:</td>
    <td style="padding:5px;"><input type="text" id="email" style="width:200px;"></td></tr>
<tr><td style="padding:5px; font-weight:bold;">Password:</td>
    <td style="padding:5px;"><input type="password" id="password" style="width:200px;" oninput="this.value=this.value.replace(/[^0-9]/g,'')"></td></tr>
<tr><td></td><td style="padding:5px;"><div id="loginError" class="error-msg"></div></td></tr>
<tr><td></td><td style="padding:8px;"><input type="submit" value="Login" class="btn"></td></tr>
</table>
</form>

<br>
<p style="font-size:14px; color:#888; text-align:center;">
Ma lihid account? <a href="signup.html" style="font-weight:bold;">Register</a>
</p>
<p style="font-size:12px; color:#aaa; text-align:center;">
Admin: admin / 1234
</p>
</div>

</td></tr>
</table>

<script>
document.getElementById("loginForm").onsubmit = function(e) {
    e.preventDefault();
    var email = document.getElementById("email").value;
    var pass = document.getElementById("password").value;
    var errDiv = document.getElementById("loginError");
    errDiv.textContent = "";

    // All fields required
    if (!email || !pass) {
        errDiv.textContent = "Fadlan buuxi dhammaan goobaha!";
        return;
    }

    // Password must contain at least one number
    if (!/[0-9]/.test(pass)) {
        errDiv.textContent = "Password must contain numbers! Add at least one digit.";
        return;
    }

    var xhr = new XMLHttpRequest();
    xhr.open("POST", "/api/login", true);
    xhr.setRequestHeader("Content-Type", "application/json");
    xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
            if (xhr.status === 200) {
                var res = JSON.parse(xhr.responseText);
                if (res.success) {
                    localStorage.setItem("hotelUser", JSON.stringify(res.user));
                    window.location.href = "../index.html";
                } else {
                    errDiv.textContent = res.error;
                }
            } else {
                errDiv.textContent = "Server error!";
            }
        }
    };
    xhr.send(JSON.stringify({email: email, password: pass}));
};

// ===== Password reveal in-place =====
(function() {
    var pw = document.getElementById('password');
    if (!pw) return;
    var timer = null;
    pw.addEventListener('input', function() {
        clearTimeout(timer);
        this.type = 'text';
        timer = setTimeout(function() {
            if (pw) pw.type = 'password';
        }, 200);
    });
    pw.addEventListener('blur', function() {
        clearTimeout(timer);
        if (pw) pw.type = 'password';
    });
})();
</script>

</body>
</html>
