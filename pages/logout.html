<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN">
<html>
<head>
<title>Kismaayo Hotel - Logout</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<table class="log-layout">
<tr><td class="log-header">Kismaayo Hotel</td></tr>
<tr><td class="log-body">

<div class="log-box" style="text-align:center;">
<h2 style="border-bottom:2px solid #08c; padding-bottom:8px; margin-top:0;">Logout</h2>
<p style="color:#555; font-size:16px;">Ma hubtaa inaad logout dhahaysid?</p>
<p style="color:#888; font-size:13px;">Waxaa lagaaga saari doonaa account-kaaga.</p>

<br>
<div id="logoutButtons">
    <button class="btn" onclick="doLogout()" style="background:#cc0000; color:#fff; padding:10px 30px; font-size:16px;">Logout</button>
    &nbsp;&nbsp;
    <button class="btn" onclick="goBack()" style="padding:10px 30px; font-size:16px;">Cancel</button>
</div>

<div id="logoutMsg" class="error-msg" style="margin-top:15px; display:none;"></div>
</div>

</td></tr>
</table>

<script>
function doLogout() {
    var btn = document.querySelector("#logoutButtons .btn:first-child");
    btn.disabled = true;
    btn.textContent = "Logging out...";
    localStorage.removeItem("hotelUser");
    setTimeout(function() {
        window.location.href = "login.html";
    }, 500);
}

function goBack() {
    window.history.back();
}
</script>

</body>
</html>
