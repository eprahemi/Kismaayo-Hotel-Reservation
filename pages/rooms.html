<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN">
<html>
<head>
    <title>Kismaayo Hotel - Rooms</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<script>
if (!localStorage.getItem("hotelUser")) {
    window.location.href = "login.html";
}
</script>

<table class="layout">
<tr><td class="header" colspan="2">Kismaayo Hotel - Our Rooms</td></tr>
<tr><td class="nav" colspan="2">
    <a href="../index.html">Home</a>
    <a href="rooms.html" class="active">Rooms</a>
    <a href="reservation.html">Book Now</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="admin.html" id="adminLink">Admin</a>
    <script>if(localStorage.hotelUser){var u=JSON.parse(localStorage.hotelUser);if(!u.isAdmin){document.getElementById('adminLink').style.display='none'}}</script>
    <a href="hotel-info.html">About</a>
    <a href="logout.html" id="logoutLink">Logout</a>
    <script>if(!localStorage.getItem('hotelUser')){document.getElementById('logoutLink').style.display='none'}</script>
</td></tr>
<tr>
<td class="sidebar">
    <h3>Room Types</h3>
    <div id="sidebarRooms">
    <p style="color:#888;">Loading...</p>
    </div>
    <br>
    <h3>Book Now</h3>
    <a href="reservation.html" class="btn btn-small">Book a Room</a>
</td>
<td class="content">

<h2>Our Rooms</h2>

<div id="roomDisplay">
<p style="color:#888;">Loading rooms...</p>
</div>

</td>
</tr>
</table>

<script>
function loadRooms() {
    var xhr = new XMLHttpRequest();
    xhr.open("GET", "/api/rooms", true);
    xhr.onreadystatechange = function() {
        if (xhr.readyState === 4 && xhr.status === 200) {
            var res = JSON.parse(xhr.responseText);
            if (res.success) {
                var rooms = res.rooms;

                // Sidebar links
                var sbHtml = "";
                for (var i = 0; i < rooms.length; i++) {
                    sbHtml += '<a href="reservation.html?room=' + rooms[i].name.toLowerCase() + '">' + rooms[i].name + ' - $' + rooms[i].price + '</a><br>';
                }
                document.getElementById("sidebarRooms").innerHTML = sbHtml;

                // Main display - each room in a table card with amenities
                var html = "";
                for (var i = 0; i < rooms.length; i++) {
                    var r = rooms[i];
                    var amenities = r.amenities ? r.amenities : "";
                    html += '<table class="room-table" style="margin-bottom:15px;">';
                    html += '<tr><td class="room-img" style="width:100px;">' + r.name + '</td>';
                    html += '<td style="padding:15px;">';
                    html += '<h3>' + r.name + '</h3>';
                    html += '<p style="color:#555;">Price: <strong>$' + r.price + '</strong> / night</p>';
                    if (amenities) {
                        html += '<p style="color:#555; font-size:13px;"><strong>Facilities:</strong> ' + amenities + '</p>';
                    }
                    html += '<a href="reservation.html?room=' + r.name.toLowerCase() + '" class="btn btn-small">Book Now</a>';
                    html += '</td></tr></table>';
                }
                document.getElementById("roomDisplay").innerHTML = html;
            }
        }
    };
    xhr.send();
}

loadRooms();
</script>

</body>
</html>
